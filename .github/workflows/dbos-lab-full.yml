name: DBOS lab full check

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  check-full:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v7
        with:
          go-version-file: go.mod
          cache: true
          cache-dependency-path: go.sum
      - name: Run all proofs with full timings
        run: make check-full
      - name: Upload evidence report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: dbos-lab-report
          path: artifacts/dbos-lab-report.json
          if-no-files-found: error
      - name: Stop lab infrastructure
        if: always()
        run: make down
