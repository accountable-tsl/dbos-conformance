name: DBOS lab full check

on:
  workflow_dispatch:

jobs:
  check-full:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - name: Run all proofs with full timings
        run: make check-full
      - name: Stop lab infrastructure
        if: always()
        run: make down
